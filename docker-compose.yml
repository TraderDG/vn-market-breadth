version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vn_breadth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vn_breadth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vn_breadth_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vn_breadth
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:password@postgres:5432/vn_breadth
      DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vn_breadth_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
